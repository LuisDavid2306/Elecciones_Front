<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-4">

      <div class="card">

        <div class="card-header text-center">
          <h4>Iniciar Sesión</h4>
        </div>

        <div class="card-body">

          <div class="mb-3">

            <label class="form-label">
              Usuario
            </label>

            <input
              type="text"
              class="form-control"
              [(ngModel)]="username">

          </div>

          <div class="mb-3">

            <label class="form-label">
              Contraseña
            </label>

            <input
              type="password"
              class="form-control"
              [(ngModel)]="password">

          </div>

          <button
            class="btn btn-primary w-100"
            (click)="login()">

            Ingresar

          </button>

        </div>

      </div>

    </div>

  </div>

</div>
