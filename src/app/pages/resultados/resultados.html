<div class="container mt-4">

    <h2>Resultados</h2>

    <table class="table table-bordered">

        <thead>

            <tr>

                <th>ID</th>
                <th>Elección</th>
                <th>Candidato</th>
                <th>Total Votos</th>

            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let r of resultados">

                <td>{{r.id}}</td>
                <td>{{r.eleccionId}}</td>
                <td>{{r.candidatoId}}</td>
                <td>{{r.totalVotos}}</td>

            </tr>

        </tbody>

    </table>

</div>
